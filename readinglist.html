<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta property="og:title" content="reading list: 2026 and beyond!" />
    <meta property="og:description" content="samuel osei — a personal website" />
    <meta property="og:image" content="https://github.com/user-attachments/assets/a5098df0-ecde-4d08-9e79-1b01a106fa67" />
    <meta property="og:url" content="https://voightachrome.com" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Unna:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  <title>Reading List</title>
<link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/voightachrome/voightachrome.github.io/refs/heads/main/Nichijou%20Logo%20(1).ico">
  <style>
    /*==== Font ====*/
    @font-face {
      font-family: 'Constantia';
      src: url('fonts/constantia.woff2') format('woff2'),
           url('fonts/constantia.woff')  format('woff');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
    font-family: 'Unna';
    font-style: normal;
    font-weight: 400;
    src: url(https://fonts.gstatic.com/s/unna/v25/AYCEpXzofN0NOpELlUPBSFJSxw.woff2) format('woff2');
    unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
    }

    @font-face {
    font-family: 'Unna';
    font-style: normal;
    font-weight: 400;
    src: url(https://fonts.gstatic.com/s/unna/v25/AYCEpXzofN0NOp8LlUPBSFI.woff2) format('woff2');
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
    }


    /*==== Layout ====*/
    body { 
      font-family: 'Constantia', 'Unna', serif; 
      background: #fff; 
      color: #333; 
      line-height: 1.6; 
      display: flex; 
      justify-content: center; 
      padding: 20px; 
      min-height: 100vh; 
      font-synthesis: weight;
    }
    .container { width: 100%; max-width: 800px; }

    
    /*==== Comments ====*/
    .comments__header { cursor: pointer; font-size: 1.2rem; margin-bottom: 15px; background: none; border: none; display: flex; align-items: center; font-family: 'Constantia', serif; width: 100%; justify-content: flex-start; }
    .comments__arrow { transition: transform 0.3s ease; font-size: 1.5rem; margin-left: auto; }
    .comments--visible .comments__arrow { transform: rotate(90deg); }
    .comments__list { list-style: none; padding: 0; display: none; }
    .comments--visible .comments__list { display: block; }
    .comment-item { padding: 15px 0; border-bottom: 1px solid #e0e0e0; }
    .author { 
      font-weight: 700;
      font-family: 'Constantia', serif;
      font-synthesis: none;
    }

    .timestamp { font-size: 0.8rem; color: #666; margin-left: 10px; }
    .body { margin-top: 10px; }
    .body.preserve-newlines { white-space: pre-wrap; line-height: 1.2; }
    .body.preserve-newlines br + br { line-height: 0.5; }
    .body img { max-width: 100%; height: auto; }
    .body blockquote { border-left: 2px solid #ccc; background: #f9f9f9; color: #666; margin: 0.5em 0; padding: 0.5em 0.5em; }

    /*==== Footer ====*/
    .footer { text-align: center; font-size: 0.8rem; color: blue; padding: 20px 0; }
    .home-button { margin-top: 10px; display: inline-block; font-size: 0.9rem; color: #0066CC; text-decoration: none; }

    @media (max-width: 768px) { 
      .header__title { font-size: 2.5rem; } 
      .header__subtitle { font-size: 1.4rem; }
      .article-body img.float-left,
      .article-body img.float-right {
        float: none;
        max-width: 80%;
        margin: 1em auto;
        display: block;
      }
    }
    @media (max-width: 480px) { 
      .header__title { font-size: 2rem; } 
      .header__subtitle { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header-wrapper">
      <div class="image-container">
      </div>
      
   
    <section id="article-body" class="article-body">Loading article…</section>
 <hr class="divider">

    <section id="comments-section">
      <button class="comments__header" id="toggle-comments"><span>Comments</span><span class="comments__arrow">›</span></button>
      
      <ul class="comments__list" id="comment-list"></ul>
      <a id="github-issue-link" href="#" target="_blank">Go to GitHub</a> to add a comment
    </section>

    <footer class="footer">
      <a href="index.html" class="home-button">Home</a>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    marked.setOptions({ gfm: true });
    (function() {
      const RAW_MD_URL = 'https://raw.githubusercontent.com/voightachrome/voightachrome.github.io/refs/heads/main/reading%20list.md';
      const COMMENTS_API = 'https://api.github.com/repos/voightachrome/voightachrome.github.io/issues/5/comments';
      const ISSUE_URL = 'https://github.com/voightachrome/voightachrome.github.io/issues/5';

      document.getElementById('github-issue-link').href = ISSUE_URL;
      document.getElementById('toggle-comments').addEventListener('click', () => {
        document.getElementById('comments-section').classList.toggle('comments--visible');
      });
      
      async function loadArticle() {
        try {
          const res = await fetch(RAW_MD_URL);
          const md = await res.text();
          document.getElementById('article-body').innerHTML = marked.parse(md);
          // Process images after markdown is parsed
          processImages();
          // Process captions after a brief delay to ensure DOM is ready
          setTimeout(() => {
            processCaptions();
          }, 100);
        } catch(e) {
          console.error('Failed to load article:', e);
        }
      }

      async function loadComments() {
        try {
          const res = await fetch(COMMENTS_API);
          const data = await res.json();
          const list = document.getElementById('comment-list');
          list.innerHTML = '';
          data.forEach(c => {
            const li = document.createElement('li'); li.className = 'comment-item';
            const date = new Date(c.created_at).toLocaleString();
            const raw = c.body;
            const html = marked.parse(raw);
            const bodyDiv = document.createElement('div');
            bodyDiv.className = 'body';
            bodyDiv.innerHTML = html;
            if (/\n\s*\n/.test(raw)) bodyDiv.classList.add('preserve-newlines');
            const authorSpan = `<span class="author"><img src="${c.user.avatar_url}" width="24" height="24"> ${c.user.login}</span>`;
            const timeSpan = `<span class="timestamp">${date}</span>`;
            li.innerHTML = `${authorSpan} ${timeSpan}`;
            li.appendChild(bodyDiv);
            list.appendChild(li);
          });
          document.getElementById('comment-count').textContent = data.length;
        } catch(e) {
          console.error('Failed to load comments:', e);
        }
      }

      document.addEventListener('DOMContentLoaded', () => { loadArticle(); loadComments(); });
    })();
  </script>
</body>
</html>
